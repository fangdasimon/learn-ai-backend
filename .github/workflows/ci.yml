# --- GitHub Actions: 持续集成 (CI) 工作流 ---
# 目标：在每次推送或 PR 时自动化校验代码质量与 Docker 镜像完整性
name: CI-Build-Check

on:
  # 当代码推送到 main 分支时触发
  push:
    branches: [ "main" ]
  # 当针对 main 分支发起 Pull Request 时触发
  pull_request:
    branches: [ "main" ]

# 移除全局 working-directory，因为工作流现在就在仓库根目录下运行
jobs:
  # 任务 1: 代码规范检查 (Linting)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # 缓存路径已更新为根目录下的 package-lock.json
          cache-dependency-path: package-lock.json

      - name: 安装项目依赖
        run: npm ci

      - name: 运行 Lint 校验
        run: npm run lint

  # 任务 2: Docker 镜像预构建校验 (Docker Build Check)
  # 这一步能确保代码修改没有破坏 Dockerfile 的构建逻辑
  docker-build:
    runs-on: ubuntu-latest
    needs: lint # 等 Lint 通过后再进行构建，节省资源
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx (支持更高级的构建特性)
        uses: docker/setup-buildx-action@v3

      - name: 预构建 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          # 构建上下文调整为当前根目录
          context: .
          file: ./Dockerfile
          push: false # 仅作为校验构建，不执行推送推送到仓库
          tags: smart-note-api:test
          # 使用 GitHub Actions 缓存来加速构建过程
          cache-from: type=gha
          cache-to: type=gha,mode=max
