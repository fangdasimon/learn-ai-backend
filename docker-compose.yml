# --- PostgreSQL + NestJS 应用编排配置 ---
# 注意：新版本 Docker Compose 已建议移除 version 字段以避免解析干扰
services:
  # --- 数据库服务 (PostgreSQL + pgvector) ---
  db:
    image: ankane/pgvector:latest # 官方支持向量检索的 Postgres 镜像
    container_name: smart-note-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-smart_note_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # 持久化存储数据库文件
    healthcheck:
      # 健康检查，确保数据库就绪
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- NestJS 后端服务 ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-note-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      # ⚠️ 注意：连接地址使用服务名 'db' 而非 'localhost'
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smart_note_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key_123}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      SILICONFLOW_BASE_URL: ${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
    depends_on:
      db:
        condition: service_healthy # 等待数据库健康后启动 API

volumes:
  postgres_data: # 定义命名卷
